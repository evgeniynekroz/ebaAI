<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ebaAI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#0a0a0a; --s1:#111; --s2:#1a1a1a; --s3:#222;
  --b1:rgba(255,255,255,.06); --b2:rgba(255,255,255,.11);
  --t1:#f0f0f0; --t2:#777; --t3:#444;
  --accent:#6c63ff; --ac2:rgba(108,99,255,.13);
  --usr:#1c1c2e; --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;height:100dvh;overflow:hidden;}
body{font-family:'Onest',-apple-system,sans-serif;background:var(--bg);color:var(--t1);display:flex;height:100vh;}
button{font-family:inherit;cursor:pointer;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}

/* ── SIDEBAR ── */
.sb{width:260px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0;transition:transform .25s;z-index:20;}
.sb-head{padding:14px 12px 8px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--b1);}
.logo{display:flex;align-items:center;gap:7px;flex:1;font-size:15px;font-weight:700;letter-spacing:-.3px;}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);flex-shrink:0;}
.ib{width:28px;height:28px;border:1px solid var(--b1);background:transparent;color:var(--t2);border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;}
.ib:hover{background:var(--s2);color:var(--t1);}
.chat-list{flex:1;overflow-y:auto;padding:6px 8px;}
.cl-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;padding:10px 6px 4px;}
.ci{display:flex;align-items:center;gap:8px;padding:8px 8px;border-radius:10px;cursor:pointer;transition:.1s;position:relative;}
.ci:hover{background:var(--s2);}
.ci.active{background:var(--ac2);}
.ci-ico{width:28px;height:28px;border-radius:7px;background:var(--s2);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--t2);font-size:12px;}
.ci-info{flex:1;min-width:0;}
.ci-name{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-del{opacity:0;background:none;border:none;color:var(--t3);padding:2px;border-radius:4px;transition:.1s;font-size:14px;}
.ci:hover .ci-del{opacity:1;}
.ci-del:hover{color:var(--t1);}
.sb-bot{padding:10px;border-top:1px solid var(--b1);}
.usr-row{display:flex;align-items:center;gap:8px;padding:8px;border-radius:10px;}
.ava{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#a78bfa);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.u-inf{flex:1;min-width:0;}
.u-name{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.u-sub{font-size:11px;color:var(--t2);}
.logout-btn{background:none;border:none;color:var(--t3);font-size:15px;padding:4px;border-radius:6px;transition:.1s;}
.logout-btn:hover{color:var(--t1);}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--b1);background:var(--s1);gap:10px;flex-shrink:0;}
.burger{display:none;width:30px;height:30px;border:1px solid var(--b1);background:transparent;color:var(--t2);border-radius:8px;align-items:center;justify-content:center;}
.burger:hover{background:var(--s2);}
.tb-title{font-size:13.5px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── MESSAGES ── */
.msgs{flex:1;overflow-y:auto;padding:16px 0;}
.mw{max-width:700px;width:100%;margin:0 auto;padding:2px 16px;}

/* ── WELCOME ── */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;text-align:center;min-height:60vh;}
.wl-title{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:6px;}
.wl-sub{font-size:14px;color:var(--t2);}

/* ── MESSAGES ── */
.msg{display:flex;flex-direction:column;margin-bottom:18px;}
.msg.user{align-items:flex-end;}
.msg.bot{align-items:flex-start;width:100%;}
.mb-user{display:inline-block;max-width:78%;padding:10px 14px;border-radius:10px;font-size:13.5px;line-height:1.65;word-break:break-word;background:var(--usr);border:1px solid var(--b2);}
.mb-bot{width:100%;font-size:13.5px;line-height:1.75;word-break:break-word;}
.mb-bot h1,.mb-bot h2,.mb-bot h3{font-size:15px;font-weight:700;margin:12px 0 6px;}
.mb-bot p{margin-bottom:8px;}
.mb-bot ul,.mb-bot ol{padding-left:18px;margin-bottom:8px;}
.mb-bot li{margin-bottom:3px;}
.mb-bot pre{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:12px;overflow-x:auto;margin:8px 0;}
.mb-bot code{background:var(--s2);padding:2px 5px;border-radius:4px;font-size:12.5px;}
.mb-bot pre code{background:none;padding:0;}
.mb-bot a{color:var(--accent);}
.mt{font-size:11px;color:var(--t3);margin-top:4px;}

/* typing */
.typing{display:inline-flex;align-items:center;gap:4px;padding:2px 0;}
.td{width:7px;height:7px;background:var(--t3);border-radius:50%;animation:td .8s ease-in-out infinite;}
.td:nth-child(2){animation-delay:.15s;}
.td:nth-child(3){animation-delay:.3s;}
@keyframes td{0%,80%,100%{transform:scale(.6);opacity:.4;}40%{transform:scale(1);opacity:1;}}

/* ── INPUT ── */
.inp-area{padding:10px 16px 14px;background:var(--bg);flex-shrink:0;}
.inp-wrap{max-width:700px;margin:0 auto;}
.inp-box{background:var(--s1);border:1px solid var(--b2);border-radius:16px;transition:.2s;overflow:hidden;}
.inp-box:focus-within{border-color:rgba(108,99,255,.5);box-shadow:0 0 0 3px rgba(108,99,255,.07);}
.inp-row{display:flex;align-items:flex-end;padding:10px 10px 6px;gap:8px;}
textarea{flex:1;background:transparent;border:none;outline:none;color:var(--t1);font-size:14px;font-family:inherit;resize:none;max-height:140px;line-height:1.5;}
textarea::placeholder{color:var(--t3);}
.send-btn{width:32px;height:32px;background:var(--accent);border:none;border-radius:10px;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;}
.send-btn:hover{background:#5a52e0;}
.send-btn:disabled{opacity:.3;cursor:not-allowed;}
.toolbar{display:flex;align-items:center;gap:4px;padding:0 8px 8px;}
.tb{display:flex;align-items:center;gap:4px;padding:4px 9px;border-radius:14px;border:1px solid transparent;background:transparent;color:var(--t2);font-size:12px;transition:.15s;}
.tb:hover{background:var(--s2);color:var(--t1);border-color:var(--b1);}
.tb.on{background:var(--ac2);color:var(--accent);border-color:rgba(108,99,255,.25);}

/* ── AUTH ── */
#authPage{flex:1;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(108,99,255,.1) 0%,transparent 60%);}
.auth-box{background:var(--s1);border:1px solid var(--b2);border-radius:22px;padding:32px;width:340px;}
.auth-logo{text-align:center;margin-bottom:24px;}
.auth-dot{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),#a78bfa);border-radius:14px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.auth-logo h1{font-size:20px;font-weight:700;letter-spacing:-.3px;}
.auth-logo p{font-size:13px;color:var(--t2);margin-top:3px;}
.auth-tabs{display:flex;background:var(--s2);border-radius:10px;padding:3px;margin-bottom:18px;}
.atab{flex:1;padding:7px;border-radius:8px;border:none;background:transparent;color:var(--t2);font-size:13px;font-family:inherit;cursor:pointer;font-weight:500;transition:.15s;}
.atab.active{background:var(--s1);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.3);}
.ainp{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:10px 13px;color:var(--t1);font-size:14px;font-family:inherit;outline:none;transition:.15s;margin-bottom:10px;}
.ainp:focus{border-color:rgba(108,99,255,.5);}
.abtn{width:100%;padding:10px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:.15s;}
.abtn:hover{background:#5a52e0;}
.aerr{font-size:12.5px;color:#e05555;margin-bottom:8px;display:none;}
.ahint{font-size:11.5px;color:var(--t3);text-align:center;margin-top:8px;}
.tg-wrap{display:flex;justify-content:center;padding:6px 0;}

/* ── OVERLAY ── */
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:19;}

/* ── MOBILE ── */
@media(max-width:640px){
  .sb{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);}
  .sb.open{transform:translateX(0);}
  .sb-ov.open{display:block;}
  .burger{display:flex;}
  .auth-box{width:92%;padding:24px;}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authPage">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-dot">🤖</div>
      <h1>ebaAI</h1>
      <p>Войди чтобы начать</p>
    </div>
    <div class="auth-tabs">
      <button class="atab active" onclick="switchTab('widget')">Telegram</button>
      <button class="atab" onclick="switchTab('code')">По коду</button>
    </div>
    <div id="tabWidget">
      <p style="font-size:13px;color:var(--t2);text-align:center;margin-bottom:10px;">Нажми — Telegram подтвердит</p>
      <div class="tg-wrap">
        <script async src="https://telegram.org/js/telegram-widget.js?22"
          data-telegram-login="ebaAI_offc_bot"
          data-size="large"
          data-onauth="onTgAuth(user)"
          data-request-access="write"
          data-userpic="false"></script>
      </div>
    </div>
    <div id="tabCode" style="display:none">
      <div id="stepUser">
        <div class="aerr" id="errUser"></div>
        <input class="ainp" id="inUser" placeholder="@username в Telegram" onkeydown="if(event.key==='Enter')reqCode()">
        <button class="abtn" onclick="reqCode()">Получить код</button>
        <p class="ahint">Бот пришлёт 6-значный код</p>
      </div>
      <div id="stepCode" style="display:none">
        <div class="aerr" id="errCode"></div>
        <p style="font-size:13px;color:var(--t2);margin-bottom:8px;">Введи код из Telegram:</p>
        <input class="ainp" id="inCode" placeholder="000000" maxlength="6"
          style="text-align:center;font-size:22px;letter-spacing:8px"
          onkeydown="if(event.key==='Enter')doVerify()">
        <button class="abtn" onclick="doVerify()">Войти</button>
        <button onclick="document.getElementById('stepUser').style.display='';document.getElementById('stepCode').style.display='none'"
          style="background:none;border:none;color:var(--t3);font-size:12px;cursor:pointer;width:100%;text-align:center;margin-top:6px;">← Изменить username</button>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;flex:1;overflow:hidden">

  <!-- Sidebar -->
  <div class="sb" id="sb">
    <div class="sb-head">
      <div class="logo"><div class="logo-dot"></div>ebaAI</div>
      <button class="ib" onclick="newChat()" title="Новый чат">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
    <div class="chat-list" id="chatList">
      <div class="cl-label">Чаты</div>
    </div>
    <div class="sb-bot">
      <div class="usr-row">
        <div class="ava" id="sbAva">?</div>
        <div class="u-inf">
          <div class="u-name" id="sbName">Загрузка...</div>
          <div class="u-sub" id="sbSub"></div>
        </div>
        <button class="logout-btn" onclick="doLogout()" title="Выйти">↩</button>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <button class="burger ib" onclick="toggleSb()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <div class="tb-title" id="topTitle">Новый чат</div>
    </div>

    <!-- Messages -->
    <div class="msgs" id="msgs">
      <div class="mw" id="welcomeWrap">
        <div class="welcome">
          <div class="wl-title">С чего начнём?</div>
          <div class="wl-sub">Задай вопрос или выбери режим ниже</div>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="inp-area">
      <div class="inp-wrap">
        <div class="inp-box">
          <div class="inp-row">
            <textarea id="msgInput" placeholder="Написать..." rows="1"
              onkeydown="onKey(event)" oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMsg()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2 15 22l-4-9-9-4 20-7z"/></svg>
            </button>
          </div>
          <div class="toolbar">
            <button class="tb" id="tbSearch" onclick="toggleMode('search')">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              Поиск
            </button>
            <button class="tb" id="tbCode" onclick="toggleMode('code')">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
              Код
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="sb-ov" id="sbOv" onclick="closeSb()"></div>

<script>
const API='https://restless-resonance-59cf.evgen20111110.workers.dev';
let token=localStorage.getItem('eba_token');
let profile=null;
let curChatId=null;
let chats=[]; // [{id,name,msgs:[]}]
let activeMode=null; // 'search'|'code'|null
let authUser='';

// ── INIT ──
window.onload=async()=>{
  if(token) await boot();
};

async function boot(){
  try{
    document.getElementById('authPage').style.display='none';
    const app=document.getElementById('app');
    app.style.display='flex';
    await loadProfile();
    await loadChats();
    document.getElementById('msgInput').focus();
  }catch(e){if(e?.status===401||e?.message==='Unauthorized') doLogout();}
}

// ── AUTH ──
function switchTab(t){
  document.querySelectorAll('.atab').forEach((b,i)=>b.classList.toggle('active',i===(t==='widget'?0:1)));
  document.getElementById('tabWidget').style.display=t==='widget'?'':'none';
  document.getElementById('tabCode').style.display=t==='code'?'':'none';
}
async function onTgAuth(u){
  try{
    const r=await fetch(`${API}/api/auth/widget`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(u)});
    const d=await r.json();
    if(d.token){token=d.token;localStorage.setItem('eba_token',token);await boot();}
    else showErr('errUser',d.error||'Ошибка');
  }catch{showErr('errUser','Ошибка подключения');}
}
async function reqCode(){
  const u=document.getElementById('inUser').value.trim();
  if(!u){showErr('errUser','Введи username');return;}
  authUser=u;
  try{
    const r=await fetch(`${API}/api/auth/code`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u})});
    const d=await r.json();
    if(d.ok){document.getElementById('stepUser').style.display='none';document.getElementById('stepCode').style.display='';document.getElementById('inCode').focus();}
    else showErr('errUser',d.error||'Ошибка');
  }catch{showErr('errUser','Ошибка подключения');}
}
async function doVerify(){
  const code=document.getElementById('inCode').value.trim();
  if(code.length!==6){showErr('errCode','Введи 6 цифр');return;}
  try{
    const r=await fetch(`${API}/api/auth/verify`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:authUser,code})});
    const d=await r.json();
    if(d.token){token=d.token;localStorage.setItem('eba_token',token);await boot();}
    else showErr('errCode',d.error||'Неверный код');
  }catch{showErr('errCode','Ошибка подключения');}
}
function showErr(id,msg){const el=document.getElementById(id);el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',4000);}
function doLogout(){localStorage.removeItem('eba_token');token=null;profile=null;curChatId=null;chats=[];document.getElementById('app').style.display='none';document.getElementById('authPage').style.display='flex';}

// ── PROFILE ──
async function loadProfile(){
  const r=await apig('profile');
  profile=r;
  const n=r.first_name||r.username||'User';
  document.getElementById('sbAva').textContent=n[0].toUpperCase();
  document.getElementById('sbName').textContent=n;
  document.getElementById('sbSub').textContent=r.tier||'';
}

// ── CHATS ──
async function loadChats(){
  try{
    const r=await apig('chats');
    chats=(r.chats||[]).map(c=>({...c,msgs:[]}));
    renderChatList();
    if(chats.length>0) await selectChat(chats[0].id);
  }catch{}
}
function renderChatList(){
  const el=document.getElementById('chatList');
  const items=chats.map(c=>`
    <div class="ci${c.id===curChatId?' active':''}" onclick="selectChat('${c.id}')">
      <div class="ci-ico">💬</div>
      <div class="ci-info"><div class="ci-name">${esc(c.name||'Чат')}</div></div>
      <button class="ci-del" onclick="event.stopPropagation();deleteChat('${c.id}')" title="Удалить">✕</button>
    </div>`).join('');
  el.innerHTML='<div class="cl-label">Чаты</div>'+items;
}
async function selectChat(id){
  curChatId=id;
  const chat=chats.find(c=>c.id===id);
  document.getElementById('topTitle').textContent=chat?.name||'Чат';
  renderChatList();
  // Загружаем сообщения если не загружены
  if(!chat?.msgs?.length){
    try{
      const r=await apig('chats/'+id);
      if(chat) chat.msgs=(r.messages||[]).map(m=>({role:m.role,text:m.content,time:m.created_at?.slice(11,16)||''}));
    }catch{}
  }
  renderMessages();
  closeSb();
}
async function newChat(){
  try{
    const r=await apiPost('chats',{name:'Новый чат'});
    const chat={id:r.id,name:r.name,msgs:[]};
    chats.unshift(chat);
    await selectChat(chat.id);
  }catch{
    // Оффлайн режим
    const id='local_'+Date.now();
    const chat={id,name:'Новый чат',msgs:[]};
    chats.unshift(chat);
    curChatId=id;
    renderChatList();
    renderMessages();
    closeSb();
  }
}
async function deleteChat(id){
  try{await apig2('chats/'+id,'DELETE');}catch{}
  chats=chats.filter(c=>c.id!==id);
  if(curChatId===id){curChatId=null;renderMessages();}
  renderChatList();
}

// ── MESSAGES ──
function renderMessages(){
  const el=document.getElementById('msgs');
  const chat=chats.find(c=>c.id===curChatId);
  if(!chat?.msgs?.length){
    el.innerHTML='<div class="mw" id="welcomeWrap"><div class="welcome"><div class="wl-title">С чего начнём?</div><div class="wl-sub">Задай вопрос или выбери режим ниже</div></div></div>';
    return;
  }
  el.innerHTML='';
  for(const m of chat.msgs) addMsgEl(m.role,m.text,m.time);
}
function addMsgEl(role,text,time){
  const el=document.getElementById('msgs');
  document.getElementById('welcomeWrap')?.remove();
  const w=document.createElement('div');w.className='mw';
  const t=time||new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  if(role==='user'){
    w.innerHTML=`<div class="msg user"><div class="mb-user">${esc(text).replace(/\n/g,'<br>')}</div><div class="mt">${t}</div></div>`;
  }else{
    w.innerHTML=`<div class="msg bot"><div class="mb-bot">${renderMD(text)}</div><div class="mt">${t}</div></div>`;
  }
  el.appendChild(w);el.scrollTop=el.scrollHeight;
}
function addTyping(){
  const el=document.getElementById('msgs');
  document.getElementById('welcomeWrap')?.remove();
  const w=document.createElement('div');w.className='mw';w.id='typingMsg';
  w.innerHTML='<div class="msg bot"><div class="mb-bot"><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div></div>';
  el.appendChild(w);el.scrollTop=el.scrollHeight;
  return w;
}

// ── SEND ──
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,140)+'px';}
function toggleMode(m){
  activeMode=activeMode===m?null:m;
  document.getElementById('tbSearch').classList.toggle('on',activeMode==='search');
  document.getElementById('tbCode').classList.toggle('on',activeMode==='code');
}

async function sendMsg(){
  const inp=document.getElementById('msgInput');
  const text=inp.value.trim();
  if(!text) return;
  inp.value='';inp.style.height='auto';
  document.getElementById('sendBtn').disabled=true;

  // Создаём чат если нет
  if(!curChatId) await newChat();
  const chat=chats.find(c=>c.id===curChatId);

  const time=new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  addMsgEl('user',text,time);
  if(chat){chat.msgs.push({role:'user',text,time});}

  // Автоимя чата
  if(chat&&(chat.name==='Новый чат'||!chat.name)&&text.length>3){
    chat.name=text.slice(0,28)+(text.length>28?'…':'');
    document.getElementById('topTitle').textContent=chat.name;
    apiPost('chats/'+curChatId,{name:chat.name}).catch(()=>{});
    renderChatList();
  }

  const td=addTyping();
  try{
    let endpoint='chat';
    let body={text,chatId:curChatId};
    if(activeMode==='search') body.forceSearch=true;
    if(activeMode==='code'){
      // /code через stream
      body.text='/code '+text;
    }
    const r=await apiPost(endpoint,body);
    td.remove();
    const reply=r.reply||'⚠️ Пустой ответ';
    const t2=new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
    addMsgEl('bot',reply,t2);
    if(chat) chat.msgs.push({role:'bot',text:reply,time:t2});
  }catch(e){
    td.remove();
    addMsgEl('bot','⚠️ '+(e.message||'Ошибка'),time);
  }
  document.getElementById('sendBtn').disabled=false;
  inp.focus();
}

// ── SIDEBAR ──
function toggleSb(){document.getElementById('sb').classList.toggle('open');document.getElementById('sbOv').classList.toggle('open');}
function closeSb(){document.getElementById('sb').classList.remove('open');document.getElementById('sbOv').classList.remove('open');}

// ── API ──
async function apig(path){
  const r=await fetch(`${API}/api/${path}`,{headers:{Authorization:`Bearer ${token}`}});
  if(r.status===401) throw Object.assign(new Error('Unauthorized'),{status:401});
  const d=await r.json();if(!r.ok) throw new Error(d.error||r.statusText);
  return d;
}
async function apig2(path,method='GET'){
  const r=await fetch(`${API}/api/${path}`,{method,headers:{Authorization:`Bearer ${token}`}});
  if(r.status===401) throw Object.assign(new Error('Unauthorized'),{status:401});
  return r.json();
}
async function apiPost(path,body){
  const r=await fetch(`${API}/api/${path}`,{method:'POST',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(r.status===401){doLogout();throw Object.assign(new Error('Unauthorized'),{status:401});}
  const d=await r.json();if(!r.ok) throw new Error(d.error||r.statusText);
  return d;
}
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderMD(text){
  if(typeof marked==='undefined') return esc(text).replace(/\n/g,'<br>');
  try{return marked.parse(String(text));}catch{return esc(text).replace(/\n/g,'<br>');}
}
