<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ebaAI</title>
<style>
    :root {
        --bg: #0f0f0f;
        --fg: #ffffff;
        --panel: #1a1a1a;
        --accent: #5ea0ff;
        --user-msg-bg: #2a2a2a;
        --assistant-msg-bg: #1e1e1e;
        --quote-bg: #1c1c1c;
        --radius: 14px;
        font-family: 'Times New Roman', serif;
    }body.light {
    --bg: #f8f8f8;
    --fg: #000000;
    --panel: #ffffff;
    --user-msg-bg: #ececec;
    --assistant-msg-bg: #e6e6e6;
    --quote-bg: #efefef;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 260px;
    background: var(--panel);
    border-right: 1px solid #333;
    display: flex;
    flex-direction: column;
}
.sidebar h2 {
    padding: 20px;
    margin: 0;
    font-size: 22px;
}
.new-chat {
    margin: 10px;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    text-align: center;
    border-radius: var(--radius);
    cursor: pointer;
    font-weight: bold;
    font-family: 'Times New Roman', serif;
}

.chat-list {
    flex: 1;
    overflow-y: auto;
}

.chat-item {
    padding: 12px 16px;
    border-bottom: 1px solid #333;
    cursor: pointer;
}

/* Main */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.top-bar {
    padding: 12px 18px;
    border-bottom: 1px solid #333;
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.message-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    font-size: 18px;
}

.msg {
    padding: 14px 18px;
    max-width: 75%;
    border-radius: var(--radius);
    line-height: 1.5;
}

.assistant {
    background: var(--assistant-msg-bg);
    font-family: 'Times New Roman', serif;
}

.user {
    background: var(--user-msg-bg);
    align-self: flex-end;
    font-family: sans-serif;
}

.quote {
    background: var(--quote-bg);
    padding: 16px;
    border-left: 4px solid var(--accent);
    border-radius: var(--radius);
    font-style: italic;
    opacity: 0.85;
}

.input-bar {
    padding: 12px;
    background: var(--panel);
    border-top: 1px solid #333;
    display: flex;
    gap: 8px;
}

.input-bar textarea {
    flex: 1;
    background: var(--user-msg-bg);
    border: none;
    padding: 12px;
    border-radius: var(--radius);
    resize: none;
    color: var(--fg);
    outline: none;
    font-family: sans-serif;
    font-size: 16px;
}

.btn-send {
    width: 120px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    cursor: pointer;
    font-family: 'Times New Roman', serif;
    font-weight: bold;
}

.theme-btn {
    cursor: pointer;
    padding: 6px 10px;
    border-radius: var(--radius);
    background: var(--user-msg-bg);
    font-family: 'Times New Roman', serif;
}

/* Telegram Login Widget fix */
#telegram-login-wrapper {
    padding: 14px;
    text-align: center;
    border-bottom: 1px solid #333;
}

</style>
</head>
<body><div class="sidebar">
    <h2>ebaAI</h2><div id="telegram-login-wrapper">
    <script async src="https://telegram.org/js/telegram-widget.js?22"
            data-telegram-login="YOUR_BOT_USERNAME"
            data-size="large"
            data-request-access="write"
            data-userpic="false"
            data-radius="8"
            data-auth-url="https://your-backend.com/auth">
    </script>
</div>

<div class="new-chat" onclick="startNewChat()">Новый чат</div>
<div class="chat-list" id="chatList"></div>

</div><div class="main">
    <div class="top-bar">
        <div>Диалог</div>
        <div class="theme-btn" onclick="toggleTheme()">Тема</div>
    </div><div class="message-area" id="messages"></div>

<div class="input-bar">
    <textarea id="input" rows="2" placeholder="Напишите сообщение..."></textarea>
    <button class="btn-send" onclick="sendMsg()">Отправить</button>
</div>

</div><script>
let firstMessage = true;

function startNewChat() {
    const messages = document.getElementById('messages');
    messages.innerHTML = '';

    const quotes = [
        "Чем займёмся сегодня?",
        "О чём хочешь поговорить?",
        "Готов помочь — спрашивай!",
        "Какая задача сегодня на повестке?"
    ];

    const q = document.createElement('div');
    q.className = 'quote';
    q.innerText = quotes[Math.floor(Math.random() * quotes.length)];
    messages.appendChild(q);

    firstMessage = false;
}

function sendMsg() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    // User message
    const userMsg = document.createElement('div');
    userMsg.className = 'msg user';
    userMsg.innerText = text;
    document.getElementById('messages').appendChild(userMsg);
    input.value = '';

    // Fake assistant response
    setTimeout(() => {
        const bot = document.createElement('div');
        bot.className = 'msg assistant';
        bot.innerText = "Ответ ebaAI: " + text;
        document.getElementById('messages').appendChild(bot);
        document.getElementById('messages').scrollTop = 999999;
    }, 300);
}

function toggleTheme() {
    document.body.classList.toggle('light');
}
</script></body>
</html>
