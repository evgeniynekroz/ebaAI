<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ebaAI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

/* --- Claude-like Palette --- */
:root {
  --bg: #fdfdfd;
  --sidebar-bg: #f9f9f8;
  --border: #e5e5e2;
  --text-main: #1a1a18;
  --text-secondary: #6b6b64;
  --accent: #7c3aed; /* Фиолетовый акцент */
  --user-bubble: #f0f0ee;
  --radius-lg: 16px;
  --radius-md: 12px;
  --sidebar-width: 280px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { 
  font-family: 'Inter', -apple-system, sans-serif; 
  background: var(--bg); 
  color: var(--text-main); 
  height: 100vh; 
  display: flex; 
  overflow: hidden; 
}

/* --- SIDEBAR --- */
.sidebar {
  width: var(--sidebar-width);
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: transform 0.3s ease;
  z-index: 100;
}

.sb-header {
  padding: 24px 16px 16px;
}

.logo { font-weight: 700; font-size: 20px; color: var(--text-main); display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 8px; }

.btn-new-chat {
  background: #fff;
  border: 1px solid var(--border);
  padding: 10px 16px;
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.2s;
  width: calc(100% - 32px);
  margin: 0 16px 20px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}
.btn-new-chat:hover { background: #f3f3f1; border-color: #d1d1ce; }

.chat-list { flex: 1; overflow-y: auto; padding: 0 8px; }
.chat-item {
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 2px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.chat-item:hover { background: #efefed; color: var(--text-main); }
.chat-item.active { background: #e5e5e2; color: var(--text-main); font-weight: 500; }

.user-block {
  padding: 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.avatar { width: 34px; height: 34px; background: #e5e5e2; border-radius: 50%; display: grid; place-items: center; font-size: 13px; font-weight: 600; }

/* --- MAIN CONTENT --- */
.main { flex: 1; display: flex; flex-direction: column; position: relative; background: var(--bg); }

.topbar {
  height: 60px;
  padding: 0 24px;
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--border);
  background: rgba(253, 253, 253, 0.8);
  backdrop-filter: blur(10px);
  z-index: 10;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  scroll-behavior: smooth;
}

.message-wrap { 
  max-width: 800px; 
  margin: 0 auto 32px auto; 
  width: 100%; 
  display: flex; 
  flex-direction: column; 
}

.msg.user { align-items: flex-end; }
.msg.bot { align-items: flex-start; }

.msg-content {
  font-size: 16px;
  line-height: 1.6;
  max-width: 85%;
}

.msg.user .msg-content {
  background: var(--user-bubble);
  padding: 12px 20px;
  border-radius: 18px;
  color: var(--text-main);
}

.msg.bot .msg-content {
  color: var(--text-main);
  width: 100%;
}

/* Стилизация Markdown внутри ответов ИИ */
.msg.bot .msg-content pre { background: #f6f6f4; padding: 16px; border-radius: 12px; overflow-x: auto; margin: 12px 0; border: 1px solid var(--border); }
.msg.bot .msg-content code { font-family: monospace; background: #f6f6f4; padding: 2px 5px; border-radius: 4px; }
.msg.bot .msg-content p { margin-bottom: 12px; }

/* --- INPUT AREA --- */
.input-container {
  padding: 0 20px 30px;
  background: linear-gradient(transparent, var(--bg) 30%);
}

.input-wrapper {
  max-width: 800px;
  margin: 0 auto;
  background: #fff;
  border: 1px solid #d1d1ce;
  border-radius: 20px;
  padding: 12px 16px;
  box-shadow: 0 2px 15px rgba(0,0,0,0.04);
  display: flex;
  flex-direction: column;
}

textarea {
  border: none;
  outline: none;
  resize: none;
  width: 100%;
  font-family: inherit;
  font-size: 16px;
  min-height: 24px;
  max-height: 250px;
  padding: 8px 0;
  color: var(--text-main);
}

.input-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.send-btn {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  width: 36px;
  height: 36px;
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: opacity 0.2s;
}
.send-btn:disabled { opacity: 0.3; cursor: default; }

/* --- AUTH PAGE --- */
#authPage {
  position: fixed; inset: 0; background: #fff; z-index: 200;
  display: flex; align-items: center; justify-content: center;
}
.auth-card {
  width: 100%; max-width: 360px; padding: 20px; text-align: center;
}
.auth-btn { 
  width: 100%; padding: 14px; background: var(--text-main); color: #fff; 
  border-radius: 12px; border: none; font-weight: 600; cursor: pointer; 
  margin-top: 15px; font-size: 15px;
}

@media (max-width: 768px) {\
  .sidebar { position: fixed; transform: translateX(-100%); height: 100%; }\
  .sidebar.open { transform: translateX(0); }\
  .burger { display: block !important; margin-right: 15px; font-size: 24px; cursor: pointer; }\
}
.burger { display: none; }
</style>
</head>
<body>

<!-- ЭКРАН ВХОДА -->
<div id=\"authPage\" style=\"display:none\">
  <div class=\"auth-card\">
    <div class=\"logo\" style=\"justify-content:center; margin-bottom: 10px;\">
       <div class=\"logo-icon\"></div> ebaAI
    </div>
    <h2 style=\"font-size: 24px; margin-bottom: 8px;\">Добро пожаловать</h2>
    <p style=\"color: var(--text-secondary); margin-bottom: 30px;\">Войдите через Telegram для начала</p>
    
    <div id=\"tg-login-container\" style=\"display:flex; justify-content:center;\"></div>
    
    <div style=\"margin-top: 25px; font-size: 12px; color: var(--text-secondary);\">
      Входя, вы соглашаетесь с правилами использования ИИ.
    </div>
  </div>
</div>

<!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
<div id=\"app\" style=\"display:none; width:100%;\">
  <aside class=\"sidebar\" id=\"sidebar\">
    <div class=\"sb-header\">
      <div class=\"logo\"><div class=\"logo-icon\"></div> ebaAI</div>
    </div>
    <button class=\"btn-new-chat\" onclick=\"newChat()\">
      <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"></line><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"></line></svg>
      Новый чат
    </button>
    <div class=\"chat-list\" id=\"chatList\"></div>
    
    <div class=\"user-block\">
      <div class=\"avatar\" id=\"uAva\">?</div>
      <div style=\"flex:1; overflow:hidden;\">
        <div style=\"font-size:14px; font-weight:600; white-space:nowrap; text-overflow:ellipsis; overflow:hidden;\" id=\"uName\">Загрузка...</div>
        <div style=\"font-size:12px; color:var(--text-secondary);\" id=\"uSub\">Free Plan</div>
      </div>
      <button onclick=\"doLogout()\" style=\"background:none; border:none; cursor:pointer; font-size:18px;\">📤</button>
    </div>
  </aside>

  <main class=\"main\">
    <div class=\"topbar\">
      <div class=\"burger\" onclick=\"toggleSidebar()\">☰</div>
      <div id=\"topTitle\" style=\"font-weight:600; font-size:15px;\">Новый чат</div>
    </div>
    
    <div class=\"messages\" id=\"msgs\">
      <!-- Приветствие если чатов нет -->
      <div id=\"welcome-screen\" style=\"margin: auto; text-align: center; max-width: 400px;\">
        <h1 style=\"font-size: 32px; margin-bottom: 16px;\">Чем я могу помочь?</h1>
        <p style=\"color: var(--text-secondary);\">Задайте вопрос, попросите написать код или просто пообщайтесь.</p>
      </div>
    </div>

    <div class=\"input-container\">
      <div class=\"input-wrapper\">
        <textarea id=\"inp\" placeholder=\"Напишите ваше сообщение...\" oninput=\"autoH(this)\" onkeydown=\"onKey(event)\"></textarea>
        <div class=\"input-actions\">
          <div style=\"font-size:12px; color:var(--text-secondary);\">ebaAI 1.0 (Claude Redesign)</div>
          <button class=\"send-btn\" id=\"sendBtn\" onclick=\"send()\">
            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.5\"><line x1=\"12\" y1=\"19\" x2=\"12\" y2=\"5\"></line><polyline points=\"5 12 12 5 19 12\"></polyline></svg>
          </button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const API = 'https://restless-resonance-59cf.evgen20111110.workers.dev';
let token = localStorage.getItem('eba_token');
let chats = [];
let curId = null;

// ИНИЦИАЛИЗАЦИЯ
async function init() {
  // Проверка токена в памяти
  if (token) {
    const success = await boot();
    if (success) return; // Если загрузилось — выходим из init
  }
  
  // Если токена нет или он не подошел — показываем вход
  document.getElementById('authPage').style.display = 'flex';
  renderTgWidget();
}

function renderTgWidget() {
  const container = document.getElementById('tg-login-container');
  container.innerHTML = '';
  const script = document.createElement('script');
  script.src = \"https://telegram.org/js/telegram-widget.js?22\";
  script.setAttribute('data-telegram-login', 'ebaAI_offc_bot');
  script.setAttribute('data-size', 'large');
  script.setAttribute('data-onauth', 'onTgAuth(user)');
  script.setAttribute('data-request-access', 'write');
  container.appendChild(script);
}

async function onTgAuth(user) {
  try {
    const r = await fetch(`${API}/api/auth/widget`, { 
      method: 'POST', 
      headers: { 'Content-Type': 'application/json' }, 
      body: JSON.stringify(user) 
    });
    const d = await r.json();
    if (d.token) {
      token = d.token;
      localStorage.setItem('eba_token', d.token);
      boot();
    }
  } catch (e) { alert('Ошибка входа'); }
}

async function boot() {
  try {
    const profile = await apiCall('profile');
    if (!profile || profile.error) throw 'Unauthorized';
    
    document.getElementById('authPage').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    
    const name = profile.first_name || profile.username || 'Пользователь';
    document.getElementById('uName').textContent = name;
    document.getElementById('uAva').textContent = name[0].toUpperCase();
    document.getElementById('uSub').textContent = profile.tier ? '✦ ' + profile.tier : 'Free Plan';
    
    await loadChats();
    return true;
  } catch (e) {
    localStorage.removeItem('eba_token');
    return false;
  }
}

async function loadChats() {
  try {
    const d = await apiCall('chats');
    chats = d.chats || [];
    renderChatList();
    if (chats.length > 0 && !curId) selectChat(chats[0].id);
  } catch (e) {}
}

function renderChatList() {
  const container = document.getElementById('chatList');
  container.innerHTML = chats.map(c => `
    <div class=\"chat-item ${c.id === curId ? 'active' : ''}\" onclick=\"selectChat('${c.id}')\">
      <span style=\"overflow:hidden; text-overflow:ellipsis; white-space:nowrap;\">${c.name || 'Чат'}</span>
    </div>
  `).join('');
}

async function selectChat(id) {
  curId = id;
  renderChatList();
  const chat = chats.find(c => c.id === id);
  document.getElementById('topTitle').textContent = chat ? chat.name : 'Новый чат';
  document.getElementById('welcome-screen')?.remove();
  
  const msgContainer = document.getElementById('msgs');
  msgContainer.innerHTML = '<div style=\"text-align:center; color:var(--text-secondary); margin-top:20px;\">Загрузка истории...</div>';
  
  try {
    const data = await apiCall(`chats/${id}`);
    msgContainer.innerHTML = '';
    if (data.messages) {
        data.messages.forEach(m => addMessageUI(m.role, m.content));
    }
    scrollBottom();
  } catch (e) { msgContainer.innerHTML = ''; }
}

function addMessageUI(role, content) {
  const container = document.getElementById('msgs');
  document.getElementById('welcome-screen')?.remove();
  
  const wrap = document.createElement('div');
  wrap.className = `message-wrap msg ${role === 'user' ? 'user' : 'bot'}`;
  
  const inner = document.createElement('div');
  inner.className = 'msg-content';
  // Рендерим Markdown для бота и обычный текст для юзера
  inner.innerHTML = role === 'user' ? escapeHtml(content).replace(/\\n/g, '<br>') : marked.parse(content);
  
  wrap.appendChild(inner);
  container.appendChild(wrap);
  scrollBottom();
}

async function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  
  // Если это первое сообщение в новом чате
  if (!curId) {
    try {
        const nc = await apiCall('chats', 'POST', { name: text.slice(0, 25) });
        curId = nc.id;
        await loadChats();
    } catch(e) { return; }
  }
  
  inp.value = '';
  autoH(inp);
  addMessageUI('user', text);
  
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  
  try {
    const res = await apiCall('chat', 'POST', { text, chatId: curId });
    if (res.reply) addMessageUI('bot', res.reply);
  } catch (e) {
    addMessageUI('bot', '**Ошибка:** Не удалось получить ответ.');
  } finally {
    btn.disabled = false;
    inp.focus();
  }
}

async function apiCall(path, method = 'GET', body = null) {
  const options = {
    method,
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
  };
  if (body) options.body = JSON.stringify(body);
  
  const r = await fetch(`${API}/api/${path}`, options);
  if (r.status === 401) { doLogout(); return; }
  return r.json();
}

function doLogout() {
  localStorage.removeItem('eba_token');
  location.reload();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function autoH(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function scrollBottom() {
  const ms = document.getElementById('msgs');
  ms.scrollTop = ms.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function newChat() {
  curId = null;
  document.getElementById('msgs').innerHTML = `
      <div id=\"welcome-screen\" style=\"margin: auto; text-align: center; max-width: 400px;\">
        <h1 style=\"font-size: 32px; margin-bottom: 16px;\">Чем я могу помочь?</h1>
        <p style=\"color: var(--text-secondary);\">Задайте вопрос, попросите написать код или просто пообщайтесь.</p>
      </div>`;
  document.getElementById('topTitle').textContent = 'Новый чат';
  renderChatList();
  if (window.innerWidth <= 768) toggleSidebar();
}

init();
</script>
</body>
</html>
