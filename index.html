<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ebaAI — Web</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root {
        --bg: #ffffff;
        --fg: #111111;
        --card: #f2f2f2;
        --border: #dcdcdc;
        --accent: #4f60ff;
    }
    [data-theme="dark"] {
        --bg: #0d0d0f;
        --fg: #f5f5f5;
        --card: #1a1a1d;
        --border: #2a2a2d;
        --accent: #7b8bff;
    }

    body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, sans-serif;
        display: flex;
        height: 100vh;
        overflow: hidden;
    }
    #sidebar {
        width: 260px;
        background: var(--card);
        border-right: 1px solid var(--border);
        padding: 15px;
        display: flex;
        flex-direction: column;
    }
    #sidebar h2 {
        font-size: 20px;
        margin: 0 0 10px;
    }
    #history {
        flex: 1;
        overflow-y: auto;
        border-top: 1px solid var(--border);
        margin-top: 10px;
        padding-top: 10px;
    }
    .history-item {
        padding: 8px;
        border-radius: 6px;
        cursor: pointer;
        border: 1px solid transparent;
    }
    .history-item:hover {
        background: var(--border);
    }

    #content {
        flex: 1;
        display: flex;
        flex-direction: column;
    }
    #topbar {
        padding: 10px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--card);
    }
    #chat {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
    }
    .msg {
        max-width: 70%;
        margin-bottom: 12px;
        padding: 10px 14px;
        border-radius: 10px;
        line-height: 1.4;
        border: 1px solid var(--border);
    }
    .me { background: var(--accent); color: white; margin-left: auto; }
    .bot { background: var(--card); }
    #inputbar {
        padding: 12px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 10px;
        background: var(--card);
    }
    #text {
        flex: 1;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg);
        color: var(--fg);
    }
    button {
        padding: 10px 14px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        background: var(--accent);
        color: white;
        font-weight: 500;
    }
    .small-btn {
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--fg);
    }

    /* AUTH SCREEN */
    #auth {
        position: fixed;
        z-index: 20;
        inset: 0;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 15px;
    }
    #auth-card {
        padding: 25px;
        border-radius: 14px;
        background: var(--card);
        border: 1px solid var(--border);
        width: 320px;
        text-align: center;
    }
    input {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg);
        color: var(--fg);
        margin-bottom: 10px;
    }
</style>
</head>
<body data-theme="dark">

<!-- AUTH SCREEN -->
<div id="auth">
    <div id="auth-card">
        <h2>Вход в ebaAI</h2>
        <p>Войти через Telegram:</p>
        <script async src="https://telegram.org/js/telegram-widget.js?22"
                data-telegram-login="ebaAI_offc_bot"
                data-size="large"
                data-userpic="false"
                data-onauth="tgLogin(user)"
                data-request-access="write"></script>

        <hr style="margin:15px 0; border-color: var(--border);">

        <p>Или войти по одноразовому коду:</p>
        <input id="uid" placeholder="Ваш Telegram ID">
        <button onclick="sendCode()">Прислать код</button>
        <input id="code" placeholder="Код из сообщения">
        <button onclick="loginCode()">Войти</button>
    </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
    <h2>ebaAI</h2>
    <button class="small-btn" onclick="newChat()">+ Новый чат</button>
    <div style="margin-top:10px;">
        <button class="small-btn" onclick="toggleTheme()">🌓 Тема</button>
    </div>
    <h3 style="margin-top:20px;">История</h3>
    <div id="history"></div>
</div>

<!-- MAIN CONTENT -->
<div id="content">
    <div id="topbar">
        <div id="chatTitle">Новый чат</div>
        <div>
            <button class="small-btn" onclick="loadHistory()">Обновить</button>
        </div>
    </div>

    <div id="chat"></div>

    <div id="inputbar">
        <input id="text" placeholder="Напишите сообщение...">
        <button onclick="send()">➤</button>
    </div>
</div>

<script>
/* ===========================
    CONFIG
=========================== */

const API = "https://YOUR_API_URL"; // TODO: ВСТАВЬ СВОЙ WORKER URL
let SESSION = localStorage.getItem("session") || null;
let CURRENT_CHAT = null;

/* ===========================
    AUTH — TELEGRAM WIDGET
=========================== */

async function tgLogin(userData) {
    const res = await fetch(API + "/auth/telegram", {
        method: "POST",
        body: JSON.stringify(userData)
    });
    const j = await res.json();
    if (j.session) {
        localStorage.setItem("session", j.session);
        SESSION = j.session;
        document.getElementById("auth").style.display = "none";
        loadHistory();
    }
}

/* ===========================
    AUTH — CODE
=========================== */

async function sendCode() {
    const uid = document.getElementById("uid").value.trim();
    if (!uid) return alert("Введите Telegram ID");

    await fetch(API + "/auth/send_code", {
        method: "POST",
        body: JSON.stringify({ uid })
    });
    alert("Код отправлен!");
}

async function loginCode() {
    const uid = document.getElementById("uid").value.trim();
    const code = document.getElementById("code").value.trim();
    if (!uid || !code) return alert("Введите данные");

    const res = await fetch(API + "/auth/check_code", {
        method: "POST",
        body: JSON.stringify({ uid, code })
    });
    const j = await res.json();
    if (j.session) {
        localStorage.setItem("session", j.session);
        SESSION = j.session;
        document.getElementById("auth").style.display = "none";
        loadHistory();
    } else alert("Неверный код");
}

/* ===========================
    LOAD HISTORY
=========================== */

async function loadHistory() {
    const res = await fetch(API + "/chat/list", {
        headers: { "Authorization": SESSION }
    });
    const j = await res.json();
    const box = document.getElementById("history");
    box.innerHTML = "";

    j.forEach(c => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerText = c.title;
        div.onclick = () => openChat(c.id);
        box.appendChild(div);
    });
}

async function openChat(id) {
    CURRENT_CHAT = id;
    document.getElementById("chat").innerHTML = "";
    document.getElementById("chatTitle").innerText = "Чат #" + id;

    const res = await fetch(API + "/chat/history?id=" + id, {
        headers: { "Authorization": SESSION }
    });
    const j = await res.json();
    j.forEach(addMsg);
}

function newChat() {
    CURRENT_CHAT = null;
    document.getElementById("chat").innerHTML = "";
    document.getElementById("chatTitle").innerText = "Новый чат";
}

/* ===========================
    MESSAGE RENDER
=========================== */

function addMsg(m) {
    const div = document.createElement("div");
    div.className = "msg " + (m.role === "user" ? "me" : "bot");
    div.innerText = m.text;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 999999;
}

/* ===========================
    SEND MESSAGE
=========================== */

async function send() {
    const t = document.getElementById("text");
    const text = t.value.trim();
    if (!text) return;
    t.value = "";

    addMsg({ role: "user", text });

    const res = await fetch(API + "/chat/send", {
        method: "POST",
        headers: {
            "Authorization": SESSION
        },
        body: JSON.stringify({
            chat: CURRENT_CHAT,
            text
        })
    });

    const j = await res.json();
    CURRENT_CHAT = j.chat;
    addMsg({ role: "assistant", text: j.reply });
}

/* ===========================
    THEME
=========================== */

function toggleTheme() {
    document.body.dataset.theme =
        document.body.dataset.theme === "dark" ? "light" : "dark";
}
</script>

</body>
</html>
