<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ebaAI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

/* ── VARIABLES ── */
:root {
  --bg: #0f0f13;
  --s1: #16161d;
  --s2: #1e1e27;
  --s3: #252530;
  --b1: rgba(255,255,255,.06);
  --b2: rgba(255,255,255,.10);
  --b3: rgba(255,255,255,.16);
  --t1: #f2f2f5;
  --t2: #8585a0;
  --t3: #3e3e55;
  --accent: #7c6fff;
  --ac2: rgba(124,111,255,.15);
  --ac3: rgba(124,111,255,.08);
  --user-bg: #1d1b35;
  --r: 16px;
  --sb: 260px;
}

/* TG theme adaptation */
body.tg {
  --bg: var(--tg-theme-bg-color, #0f0f13);
  --s1: var(--tg-theme-secondary-bg-color, #16161d);
  --t1: var(--tg-theme-text-color, #f2f2f5);
  --t2: var(--tg-theme-hint-color, #8585a0);
  --accent: var(--tg-theme-button-color, #7c6fff);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; height: 100dvh; overflow: hidden; font-family: 'Inter', -apple-system, sans-serif; }
body { background: var(--bg); color: var(--t1); display: flex; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 2px; }
::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px; }

/* ══════════════════════════
   SIDEBAR
══════════════════════════ */
.sb {
  width: var(--sb);
  background: var(--s1);
  border-right: 1px solid var(--b1);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: transform .22s cubic-bezier(.4,0,.2,1);
  z-index: 100;
}

.sb-head {
  padding: 16px 12px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -.3px;
}

.logo-icon {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}

.new-btn {
  width: 30px; height: 30px;
  background: var(--s2);
  border: 1px solid var(--b1);
  border-radius: 9px;
  color: var(--t2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: .15s;
  flex-shrink: 0;
}
.new-btn:hover { background: var(--s3); color: var(--t1); }

/* Search box */
.sb-search {
  margin: 0 10px 8px;
  position: relative;
}
.sb-search input {
  width: 100%;
  background: var(--s2);
  border: 1px solid var(--b1);
  border-radius: 10px;
  padding: 7px 10px 7px 30px;
  font-size: 13px;
  font-family: inherit;
  color: var(--t1);
  outline: none;
  transition: .15s;
}
.sb-search input::placeholder { color: var(--t3); }
.sb-search input:focus { border-color: var(--b2); }
.sb-search svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--t3); pointer-events: none; }

/* Chat list */
.chat-list { flex: 1; overflow-y: auto; padding: 0 6px 8px; }
.cl-section { font-size: 10px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: .7px; padding: 10px 6px 4px; }

.ci {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 8px;
  border-radius: 11px;
  cursor: pointer;
  transition: .12s;
  position: relative;
  group: true;
}
.ci:hover { background: var(--s2); }
.ci.active { background: var(--ac3); }

.ci-ava {
  width: 34px; height: 34px;
  border-radius: 10px;
  background: var(--s2);
  border: 1px solid var(--b1);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  transition: .12s;
}
.ci.active .ci-ava { background: var(--ac2); border-color: var(--accent); }

.ci-body { flex: 1; min-width: 0; }
.ci-name {
  font-size: 13px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ci-preview {
  font-size: 11.5px; color: var(--t2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 1px;
}

.ci-del {
  opacity: 0;
  width: 22px; height: 22px;
  background: none; border: none;
  color: var(--t3); border-radius: 6px; cursor: pointer;
  font-size: 13px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: .1s;
}
.ci:hover .ci-del { opacity: 1; }
.ci-del:hover { color: #e05555; background: rgba(224,85,85,.1); }

/* User block */
.sb-foot {
  border-top: 1px solid var(--b1);
  padding: 10px 10px;
}
.user-row {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 6px;
  border-radius: 11px;
  cursor: default;
}
.user-ava {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-sub { font-size: 11px; color: var(--t2); margin-top: 1px; }
.logout { background: none; border: none; color: var(--t3); cursor: pointer; padding: 4px; border-radius: 6px; font-size: 16px; line-height: 1; }
.logout:hover { color: var(--t1); }

/* ══════════════════════════
   MAIN
══════════════════════════ */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

/* Topbar */
.topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  background: var(--s1);
  border-bottom: 1px solid var(--b1);
  flex-shrink: 0;
  min-height: 52px;
}
.burger {
  width: 32px; height: 32px;
  background: none; border: 1px solid var(--b1);
  border-radius: 9px; color: var(--t2);
  cursor: pointer; display: none;
  align-items: center; justify-content: center;
  flex-shrink: 0;
}
.burger:hover { background: var(--s2); }
.tb-title { flex: 1; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Messages */
.msgs { flex: 1; overflow-y: auto; padding: 12px 0; }
.msg-wrap { max-width: 720px; margin: 0 auto; padding: 0 16px; }

/* Welcome */
.welcome {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 55vh; padding: 32px 20px; text-align: center;
}
.wl-icon {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 30px;
  margin-bottom: 16px;
  box-shadow: 0 8px 32px rgba(124,111,255,.25);
}
.wl-title { font-size: 22px; font-weight: 700; letter-spacing: -.4px; margin-bottom: 6px; }
.wl-sub { font-size: 14px; color: var(--t2); line-height: 1.5; }
.wl-pills { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 20px; justify-content: center; }
.wl-pill {
  padding: 6px 13px;
  background: var(--s2); border: 1px solid var(--b1);
  border-radius: 20px; font-size: 12.5px; color: var(--t2);
  cursor: pointer; transition: .15s;
}
.wl-pill:hover { background: var(--s3); color: var(--t1); border-color: var(--b2); }

/* Messages */
.msg { display: flex; flex-direction: column; margin-bottom: 16px; }
.msg.user { align-items: flex-end; }
.msg.bot { align-items: flex-start; width: 100%; }

.bubble-user {
  max-width: 80%;
  background: var(--user-bg);
  border: 1px solid rgba(124,111,255,.2);
  border-radius: 16px 16px 4px 16px;
  padding: 10px 14px;
  font-size: 14px; line-height: 1.6;
  word-break: break-word;
}
.bubble-bot {
  width: 100%;
  font-size: 14px; line-height: 1.75;
  word-break: break-word;
}
.bubble-bot h1,.bubble-bot h2,.bubble-bot h3 { font-size: 15px; font-weight: 700; margin: 12px 0 6px; }
.bubble-bot p { margin-bottom: 8px; }
.bubble-bot ul,.bubble-bot ol { padding-left: 20px; margin-bottom: 8px; }
.bubble-bot li { margin-bottom: 3px; }
.bubble-bot pre { background: var(--s2); border: 1px solid var(--b1); border-radius: 10px; padding: 12px 14px; overflow-x: auto; margin: 10px 0; font-size: 13px; }
.bubble-bot code { background: var(--s2); padding: 2px 6px; border-radius: 5px; font-size: 13px; }
.bubble-bot pre code { background: none; padding: 0; }
.bubble-bot a { color: var(--accent); text-decoration: none; }
.bubble-bot a:hover { text-decoration: underline; }
.bubble-bot table { border-collapse: collapse; margin: 8px 0; font-size: 13px; }
.bubble-bot th,.bubble-bot td { border: 1px solid var(--b2); padding: 6px 10px; }
.bubble-bot th { background: var(--s2); }

.msg-time { font-size: 11px; color: var(--t3); margin-top: 4px; }

/* Typing */
.typing-dots { display: flex; gap: 4px; padding: 4px 0; }
.td { width: 7px; height: 7px; background: var(--t3); border-radius: 50%; animation: tda .8s ease-in-out infinite; }
.td:nth-child(2) { animation-delay: .13s; }
.td:nth-child(3) { animation-delay: .26s; }
@keyframes tda { 0%,80%,100%{transform:scale(.5);opacity:.3;} 40%{transform:scale(1);opacity:.9;} }

/* ══════════════════════════
   INPUT AREA
══════════════════════════ */
.inp-area {
  padding: 10px 16px 16px;
  background: var(--bg);
  flex-shrink: 0;
}
.inp-wrap { max-width: 720px; margin: 0 auto; }
.inp-box {
  background: var(--s1);
  border: 1.5px solid var(--b2);
  border-radius: 18px;
  transition: border-color .15s, box-shadow .15s;
  overflow: hidden;
}
.inp-box:focus-within {
  border-color: rgba(124,111,255,.5);
  box-shadow: 0 0 0 3px rgba(124,111,255,.07);
}
.inp-row {
  display: flex; align-items: flex-end;
  padding: 10px 10px 6px;
  gap: 8px;
}
textarea {
  flex: 1;
  background: none; border: none; outline: none;
  color: var(--t1);
  font-size: 14px; font-family: inherit;
  resize: none; max-height: 140px; line-height: 1.55;
}
textarea::placeholder { color: var(--t3); }

.send-btn {
  width: 34px; height: 34px;
  background: var(--accent);
  border: none; border-radius: 11px;
  color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: .15s;
}
.send-btn:hover { background: #6b5fe0; transform: scale(1.04); }
.send-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }

/* Toolbar */
.toolbar {
  display: flex; align-items: center; gap: 3px;
  padding: 0 8px 8px;
}
.tb-mode {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px;
  border-radius: 20px;
  border: 1px solid transparent;
  background: none; color: var(--t2);
  font-size: 12.5px; font-family: inherit;
  cursor: pointer; transition: .15s;
}
.tb-mode:hover { background: var(--s2); color: var(--t1); border-color: var(--b1); }
.tb-mode.on { background: var(--ac2); color: var(--accent); border-color: rgba(124,111,255,.3); }

/* ══════════════════════════
   AUTH (fallback for browser)
══════════════════════════ */
#authPage {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(124,111,255,.12) 0%, transparent 70%);
}
.auth-card {
  background: var(--s1);
  border: 1px solid var(--b2);
  border-radius: 24px;
  padding: 36px 28px;
  width: 360px;
}
.ac-logo { text-align: center; margin-bottom: 28px; }
.ac-icon {
  width: 52px; height: 52px;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  border-radius: 16px;
  margin: 0 auto 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  box-shadow: 0 8px 24px rgba(124,111,255,.3);
}
.ac-logo h1 { font-size: 20px; font-weight: 700; }
.ac-logo p { font-size: 13.5px; color: var(--t2); margin-top: 3px; }

.tabs {
  display: flex; background: var(--s2);
  border-radius: 12px; padding: 3px; margin-bottom: 20px;
}
.tab {
  flex: 1; padding: 8px;
  border-radius: 10px; border: none;
  background: none; color: var(--t2);
  font-size: 13.5px; font-weight: 500; font-family: inherit;
  cursor: pointer; transition: .15s;
}
.tab.active { background: var(--s1); color: var(--t1); box-shadow: 0 1px 4px rgba(0,0,0,.3); }

.a-inp {
  width: 100%; background: var(--s2);
  border: 1.5px solid var(--b1);
  border-radius: 12px; padding: 11px 14px;
  color: var(--t1); font-size: 14px; font-family: inherit;
  outline: none; transition: .15s; margin-bottom: 10px;
}
.a-inp:focus { border-color: rgba(124,111,255,.5); }
.a-btn {
  width: 100%; padding: 12px;
  background: var(--accent); border: none;
  border-radius: 12px; color: #fff;
  font-size: 14.5px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: .15s;
}
.a-btn:hover { background: #6b5fe0; }
.a-err { font-size: 12.5px; color: #e05555; margin-bottom: 8px; display: none; }
.a-hint { font-size: 12px; color: var(--t3); text-align: center; margin-top: 10px; }

.tg-widget-wrap { display: flex; justify-content: center; padding: 4px 0 8px; }

/* ══════════════════════════
   OVERLAY + MOBILE
══════════════════════════ */
.ov {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.55); z-index: 99;
  backdrop-filter: blur(2px);
}
.ov.on { display: block; }

@media (max-width: 640px) {
  .sb {
    position: fixed; top: 0; left: 0; height: 100%;
    transform: translateX(-100%);
  }
  .sb.open { transform: none; }
  .burger { display: flex; }
  .auth-card { width: 92%; padding: 26px 20px; }
}

/* ══════════════════════════
   THINKING BLOCK
══════════════════════════ */
.think-block {
  background: var(--s2); border: 1px solid var(--b1);
  border-radius: 12px; margin-bottom: 10px; overflow: hidden;
}
.think-head {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 12px; cursor: pointer; color: var(--t2); font-size: 12px;
}
.think-head:hover { color: var(--t1); }
.think-body { padding: 8px 12px 10px; font-size: 12px; color: var(--t2); max-height: 200px; overflow-y: auto; display: none; white-space: pre-wrap; line-height: 1.6; }
.think-body.open { display: block; }
</style>
</head>
<body>

<!-- AUTH PAGE -->
<div id="authPage" style="display:none">
  <div class="auth-card">
    <div class="ac-logo">
      <div class="ac-icon">🤖</div>
      <h1>ebaAI</h1>
      <p>Войди чтобы начать</p>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="setTab('tg')">Telegram</button>
      <button class="tab" onclick="setTab('code')">По коду</button>
    </div>
    <div id="tabTg">
      <p style="font-size:13px;color:var(--t2);text-align:center;margin-bottom:12px">Нажми кнопку — Telegram подтвердит вход</p>
      <div class="tg-widget-wrap">
        <script async src="https://telegram.org/js/telegram-widget.js?22"
          data-telegram-login="ebaAI_offc_bot"
          data-size="large"
          data-radius="10"
          data-onauth="onTgWidget(user)"
          data-request-access="write"></script>
      </div>
    </div>
    <div id="tabCode" style="display:none">
      <div id="stepU">
        <div class="a-err" id="errU"></div>
        <input class="a-inp" id="inpU" placeholder="@username в Telegram" onkeydown="if(event.key==='Enter')sendCode()">
        <button class="a-btn" onclick="sendCode()">Получить код</button>
        <p class="a-hint">Бот @ebaAI_offc_bot пришлёт 6-значный код</p>
      </div>
      <div id="stepC" style="display:none">
        <div class="a-err" id="errC"></div>
        <p style="font-size:13px;color:var(--t2);margin-bottom:10px">Введи код из Telegram:</p>
        <input class="a-inp" id="inpC" placeholder="000000" maxlength="6"
          style="text-align:center;font-size:24px;letter-spacing:10px;font-weight:700"
          onkeydown="if(event.key==='Enter')verifyCode()">
        <button class="a-btn" onclick="verifyCode()">Войти</button>
        <button onclick="stepU()" style="background:none;border:none;color:var(--t3);font-size:12px;cursor:pointer;width:100%;text-align:center;margin-top:8px">← Изменить username</button>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;flex:1;overflow:hidden">
  <!-- Sidebar -->
  <div class="sb" id="sb">
    <div class="sb-head">
      <div class="logo">
        <div class="logo-icon">🤖</div>ebaAI
      </div>
      <button class="new-btn" onclick="newChat()" title="Новый чат">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
    <div class="sb-search">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input placeholder="Поиск чатов..." id="searchInp" oninput="filterChats(this.value)">
    </div>
    <div class="chat-list" id="chatList"></div>
    <div class="sb-foot">
      <div class="user-row">
        <div class="user-ava" id="uAva">?</div>
        <div class="user-info">
          <div class="user-name" id="uName">Загрузка...</div>
          <div class="user-sub" id="uSub"></div>
        </div>
        <button class="logout" onclick="doLogout()" title="Выйти">↩</button>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <button class="burger" id="burger" onclick="toggleSb()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div class="tb-title" id="topTitle">ebaAI</div>
    </div>

    <div class="msgs" id="msgs">
      <div class="msg-wrap" id="welcomeEl">
        <div class="welcome">
          <div class="wl-icon">🤖</div>
          <div class="wl-title">С чего начнём?</div>
          <div class="wl-sub">Задай вопрос, попроси написать код<br>или найти информацию</div>
          <div class="wl-pills">
            <div class="wl-pill" onclick="qs('Что нового в мире технологий?')">🌍 Новости тех</div>
            <div class="wl-pill" onclick="qs('Напиши простой сайт на HTML')">💻 Сайт на HTML</div>
            <div class="wl-pill" onclick="qs('Объясни что такое квантовые компьютеры')">🧪 Квантовые ПК</div>
            <div class="wl-pill" onclick="qs('Придумай смешную шутку')">😄 Шутка</div>
          </div>
        </div>
      </div>
    </div>

    <div class="inp-area">
      <div class="inp-wrap">
        <div class="inp-box">
          <div class="inp-row">
            <textarea id="inp" placeholder="Написать..." rows="1"
              onkeydown="onKey(event)" oninput="autoH(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="send()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2 15 22l-4-9-9-4 20-7z"/></svg>
            </button>
          </div>
          <div class="toolbar">
            <button class="tb-mode" id="tbSearch" onclick="toggleMode('search')">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              Поиск
            </button>
            <button class="tb-mode" id="tbCode" onclick="toggleMode('code')">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
              Код
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="ov" id="ov" onclick="closeSb()"></div>

<script>
const API = 'https://restless-resonance-59cf.evgen20111110.workers.dev';
const tg = window.Telegram?.WebApp;
let token = localStorage.getItem('eba_token');
let profile = null;
let chats = [];
let curId = null;
let mode = null;
let authUn = '';

// ── INIT ──
async function init() {
  // Telegram WebApp detected
  if (tg?.initData) {
    tg.ready();
    tg.expand();
    document.body.classList.add('tg');
    // Авторизуемся через initData
    try {
      const r = await fetch(`${API}/api/auth/webapp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ initData: tg.initData })
      });
      const d = await r.json();
      if (d.token) {
        token = d.token;
        localStorage.setItem('eba_token', token);
      }
    } catch(e) {
      console.error('TG auth failed', e);
    }
  }
  if (token) {
    try { await boot(); return; } catch(e) {
      if (e?.status === 401) { localStorage.removeItem('eba_token'); token = null; }
    }
  }
  document.getElementById('authPage').style.display = 'flex';
}

async function boot() {
  document.getElementById('authPage').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  await loadProfile();
  await loadChats();
  document.getElementById('inp').focus();
}

// ── AUTH ──
function setTab(t) {
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', (t==='tg'?0:1)===i));
  document.getElementById('tabTg').style.display = t==='tg' ? '' : 'none';
  document.getElementById('tabCode').style.display = t==='code' ? '' : 'none';
}
async function onTgWidget(u) {
  try {
    const r = await fetch(`${API}/api/auth/widget`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(u) });
    const d = await r.json();
    if (d.token) { token = d.token; localStorage.setItem('eba_token', token); await boot(); }
    else err('errU', d.error || 'Ошибка');
  } catch { err('errU', 'Ошибка подключения'); }
}
async function sendCode() {
  const u = document.getElementById('inpU').value.trim();
  if (!u) return err('errU', 'Введи username');
  authUn = u;
  try {
    const r = await fetch(`${API}/api/auth/code`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u}) });
    const d = await r.json();
    if (d.ok) { document.getElementById('stepU').style.display='none'; document.getElementById('stepC').style.display=''; document.getElementById('inpC').focus(); }
    else err('errU', d.error || 'Ошибка');
  } catch { err('errU', 'Нет подключения'); }
}
async function verifyCode() {
  const code = document.getElementById('inpC').value.trim();
  if (code.length !== 6) return err('errC', 'Нужно 6 цифр');
  try {
    const r = await fetch(`${API}/api/auth/verify`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:authUn,code}) });
    const d = await r.json();
    if (d.token) { token = d.token; localStorage.setItem('eba_token', token); await boot(); }
    else err('errC', d.error || 'Неверный код');
  } catch { err('errC', 'Нет подключения'); }
}
function stepU() { document.getElementById('stepC').style.display='none'; document.getElementById('stepU').style.display=''; }
function doLogout() { localStorage.removeItem('eba_token'); token=null; profile=null; chats=[]; curId=null; document.getElementById('app').style.display='none'; document.getElementById('authPage').style.display='flex'; }
function err(id, msg) { const el=document.getElementById(id); el.textContent=msg; el.style.display='block'; setTimeout(()=>el.style.display='none', 4000); }

// ── PROFILE ──
async function loadProfile() {
  const d = await apig('profile');
  profile = d;
  const n = d.first_name || d.username || 'User';
  document.getElementById('uAva').textContent = n[0].toUpperCase();
  document.getElementById('uName').textContent = n;
  document.getElementById('uSub').textContent = d.tier ? '✦ '+d.tier : '';
}

// ── CHATS ──
async function loadChats() {
  try {
    const d = await apig('chats');
    chats = (d.chats || []).map(c => ({...c, msgs: []}));
    renderChats();
    if (chats.length) await selectChat(chats[0].id);
  } catch(e) { console.error('loadChats', e); }
}

let _filterStr = '';
function filterChats(q) { _filterStr=q.toLowerCase(); renderChats(); }

function renderChats() {
  const el = document.getElementById('chatList');
  const filtered = _filterStr ? chats.filter(c => (c.name||'').toLowerCase().includes(_filterStr)) : chats;
  if (!filtered.length) { el.innerHTML='<div style="text-align:center;color:var(--t3);font-size:12.5px;padding:20px">Нет чатов</div>'; return; }
  el.innerHTML = '<div class="cl-section">Чаты</div>' + filtered.map(c => `
    <div class="ci${c.id===curId?' active':''}" onclick="selectChat('${c.id}')">
      <div class="ci-ava">💬</div>
      <div class="ci-body">
        <div class="ci-name">${esc(c.name||'Чат')}</div>
        ${c.msgs?.length ? `<div class="ci-preview">${esc((c.msgs[c.msgs.length-1]?.text||'').slice(0,35))}</div>` : ''}
      </div>
      <button class="ci-del" onclick="event.stopPropagation();delChat('${c.id}')" title="Удалить">✕</button>
    </div>`).join('');
}

async function selectChat(id) {
  curId = id;
  const chat = chats.find(c => c.id===id);
  document.getElementById('topTitle').textContent = chat?.name || 'Чат';
  renderChats();
  if (!chat?.msgs?.length) {
    try {
      const d = await apig('chats/'+id);
      if (chat) chat.msgs = (d.messages||[]).map(m => ({role:m.role,text:m.content,time:(m.created_at||'').slice(11,16)}));
    } catch {}
  }
  renderMsgs();
  closeSb();
}

async function newChat() {
  try {
    const d = await apiPost('chats', {name:'Новый чат'});
    const c = {id:d.id, name:d.name, msgs:[]};
    chats.unshift(c);
    await selectChat(c.id);
  } catch {
    const id = 'local_'+Date.now();
    const c = {id, name:'Новый чат', msgs:[]};
    chats.unshift(c); curId=id;
    renderChats(); renderMsgs(); closeSb();
  }
}

async function delChat(id) {
  try { await apig2('chats/'+id,'DELETE'); } catch {}
  chats = chats.filter(c => c.id!==id);
  if (curId===id) { curId=null; renderMsgs(); }
  renderChats();
}

// ── MESSAGES ──
function renderMsgs() {
  const el = document.getElementById('msgs');
  const chat = chats.find(c=>c.id===curId);
  if (!chat?.msgs?.length) {
    el.innerHTML='<div class="msg-wrap" id="welcomeEl"><div class="welcome"><div class="wl-icon">🤖</div><div class="wl-title">С чего начнём?</div><div class="wl-sub">Задай вопрос или выбери ниже</div><div class="wl-pills"><div class="wl-pill" onclick="qs(\'Что нового в мире технологий?\')">🌍 Новости тех</div><div class="wl-pill" onclick="qs(\'Напиши простой сайт на HTML\')">💻 Сайт на HTML</div><div class="wl-pill" onclick="qs(\'Объясни квантовые компьютеры\')">🧪 Наука</div><div class="wl-pill" onclick="qs(\'Придумай смешную шутку\')">😄 Шутка</div></div></div></div>';
    return;
  }
  el.innerHTML = '';
  for (const m of chat.msgs) addMsgEl(m.role, m.text, m.time);
}

function addMsgEl(role, text, time) {
  document.getElementById('welcomeEl')?.remove();
  const el = document.getElementById('msgs');
  const w = document.createElement('div'); w.className='msg-wrap';
  const t = time||now();
  if (role==='user') {
    w.innerHTML=`<div class="msg user"><div class="bubble-user">${esc(text).replace(/\n/g,'<br>')}</div><div class="msg-time">${t}</div></div>`;
  } else {
    w.innerHTML=`<div class="msg bot"><div class="bubble-bot">${md(text)}</div><div class="msg-time">${t}</div></div>`;
  }
  el.appendChild(w); scroll();
}

function addTypingEl() {
  document.getElementById('welcomeEl')?.remove();
  const el = document.getElementById('msgs');
  const w = document.createElement('div'); w.className='msg-wrap'; w.id='typingEl';
  w.innerHTML='<div class="msg bot"><div class="bubble-bot"><div class="typing-dots"><div class="td"></div><div class="td"></div><div class="td"></div></div></div></div>';
  el.appendChild(w); scroll();
  return w;
}

// ── SEND ──
function onKey(e) { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); send(); } }
function autoH(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,140)+'px'; }
function toggleMode(m) {
  mode = mode===m ? null : m;
  document.getElementById('tbSearch').classList.toggle('on', mode==='search');
  document.getElementById('tbCode').classList.toggle('on', mode==='code');
}
function qs(text) { document.getElementById('inp').value=text; send(); }

async function send() {
  const el = document.getElementById('inp');
  const text = el.value.trim();
  if (!text) return;
  el.value=''; el.style.height='auto';
  document.getElementById('sendBtn').disabled = true;
  if (!curId) await newChat();
  const chat = chats.find(c=>c.id===curId);
  const t = now();
  addMsgEl('user', text, t);
  if (chat) chat.msgs.push({role:'user',text,time:t});
  // Авто-имя
  if (chat && (chat.name==='Новый чат') && text.length>3) {
    chat.name = text.slice(0,30)+(text.length>30?'…':'');
    document.getElementById('topTitle').textContent = chat.name;
    apiPost('chats/'+curId,{name:chat.name}).catch(()=>{});
    renderChats();
  }
  const td = addTypingEl();
  try {
    let endpoint = 'chat';
    let body = {text,chatId:curId};
    if (mode==='search') body.forceSearch=true;
    if (mode==='code') body.text='/code '+text;
    const r = await apiPost(endpoint, body);
    td.remove();
    const reply = r.reply||'⚠️ Пустой ответ';
    const t2 = now();
    addMsgEl('bot', reply, t2);
    if (chat) chat.msgs.push({role:'bot',text:reply,time:t2});
  } catch(e) {
    td.remove();
    addMsgEl('bot','⚠️ '+(e.message||'Ошибка'),now());
  }
  document.getElementById('sendBtn').disabled = false;
  el.focus();
}

// ── SIDEBAR ──
function toggleSb() { document.getElementById('sb').classList.toggle('open'); document.getElementById('ov').classList.toggle('on'); }
function closeSb() { document.getElementById('sb').classList.remove('open'); document.getElementById('ov').classList.remove('on'); }

// ── UTILS ──
async function apig(path) {
  const r = await fetch(`${API}/api/${path}`, {headers:{Authorization:`Bearer ${token}`}});
  if (r.status===401) throw Object.assign(new Error('Unauthorized'),{status:401});
  const d = await r.json(); if (!r.ok) throw new Error(d.error||r.statusText);
  return d;
}
async function apig2(path, method='DELETE') {
  return fetch(`${API}/api/${path}`,{method,headers:{Authorization:`Bearer ${token}`}}).then(r=>r.json());
}
async function apiPost(path, body) {
  const r = await fetch(`${API}/api/${path}`,{method:'POST',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if (r.status===401) { doLogout(); throw Object.assign(new Error('Unauthorized'),{status:401}); }
  const d = await r.json(); if (!r.ok) throw new Error(d.error||r.statusText);
  return d;
}
function esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function md(text) { try { return typeof marked!=='undefined'?marked.parse(String(text)):esc(text).replace(/\n/g,'<br>'); } catch { return esc(text).replace(/\n/g,'<br>'); } }
function now() { return new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}); }
function scroll() { const el=document.getElementById('msgs'); el.scrollTop=el.scrollHeight; }

// ── START ──
init();
</script>
</body>
</html>
